<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COUNTER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="back-link" href="/">← back</a>
  <div class="counter-wrap">
    <h1 class="app-title">Counter</h1>
    <div class="counter-rule"></div>
    <div class="count-display" id="count-display">0</div>
    <div class="btn-row">
      <button class="counter-btn" id="btn-decrement">−</button>
      <button class="counter-btn" id="btn-increment">+</button>
    </div>
    <div class="btn-row-clear">
      <button class="counter-btn clear" id="btn-clear">clear</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
